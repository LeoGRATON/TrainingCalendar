security:
    password_hashers:
        # Symfony choisit automatiquement le meilleur algorithme disponible (argon2 ou bcrypt)
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"

    providers:
        # Le "provider" explique à Symfony comment charger un User depuis la base
        # Il utilise getUserIdentifier() (= email) pour faire le SELECT
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email # champ utilisé pour chercher l'utilisateur

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            stateless: true
            provider: app_user_provider

            # json_login = Symfony écoute POST /api/login
            # Il attend { "username": "...", "password": "..." } en JSON
            # En cas de succès, LexikJWT génère et retourne le token
            json_login:
                check_path: /api/login
                username_path: email # on utilise "email" au lieu de "username"
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

            # jwt = Symfony lit le token JWT dans le header Authorization
            # et charge l'utilisateur correspondant automatiquement
            jwt: ~

    access_control:
        # La route de login est publique (évidemment)
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        # L'inscription est publique aussi
        - { path: ^/api/users, roles: PUBLIC_ACCESS, methods: [POST] }
        # Tout le reste de l'API nécessite d'être authentifié
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
